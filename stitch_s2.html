<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .coral-glow {
            box-shadow: 0 0 0 4px rgba(255, 112, 67, 0.15);
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #fff8f5;
        }
    </style>

<body class="antialiased text-on-surface">
<div class="max-w-[480px] mx-auto min-h-screen bg-surface flex flex-col relative overflow-hidden">
<!-- TopNavBar - Rendered based on Shared Components JSON -->
<nav class="flex justify-between items-center w-full px-6 py-4 max-w-[480px] mx-auto bg-[#FFF8F5] dark:bg-stone-950 font-plus-jakarta text-sm font-medium tracking-tight">
<div class="text-lg font-bold text-[#FF7043]">GiftSense</div>
<a class="text-stone-500 hover:opacity-80 transition-opacity active:scale-95 duration-150" href="#">Exit</a>
</nav>
<!-- Separation Logic as per JSON -->
<div class="bg-[#FAF2EE] h-2 w-full"></div>
<main class="flex-1 flex flex-col">
<!-- Header Section -->
<header class="px-6 pt-8">
<div class="inline-flex items-center px-4 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label text-xs font-semibold tracking-wide mb-6">
                    Step 1 of 7 · About them
                </div>
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight leading-tight mb-2">
                    Who are you gifting?
                </h1>
<p class="font-body text-on-surface-variant text-base">
                    This personalises everything that follows.
                </p>
</header>
<section class="flex-1">
<!-- FIELD 1 - Name -->
<div class="px-6 pt-8 space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface">Their first name</label>
<p class="text-xs text-stone-500 font-body">Just a first name is fine</p>
<div class="relative">
<input class="w-full h-14 bg-surface-container-lowest border-[#F5E6E0] border-[1.5px] rounded-xl px-4 font-body text-on-surface focus:outline-none focus:border-primary-container focus:ring-0 coral-glow placeholder:italic placeholder:text-stone-400 transition-all" placeholder="e.g. Priya, Arjun, Mom, Rahul..." type="text" value="Priya"/>
</div>
</div>
<!-- FIELD 2 - Gender -->
<div class="px-6 mt-7 space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface">Their gender</label>
<p class="text-xs text-stone-500 font-body">Helps us use the right words in their profile</p>
<div class="flex gap-2.5 pt-1">
<button class="flex-1 h-12 rounded-full bg-primary-container text-white font-bold text-[15px] active:scale-95 transition-transform">
                            She / Her
                        </button>
<button class="flex-1 h-12 rounded-full bg-surface-container-lowest border-[#F5E6E0] border-[1.5px] text-stone-500 font-semibold text-[15px] hover:bg-surface-container transition-colors active:scale-95">
                            He / Him
                        </button>
<button class="flex-1 h-12 rounded-full bg-surface-container-lowest border-[#F5E6E0] border-[1.5px] text-stone-500 font-semibold text-[15px] hover:bg-surface-container transition-colors active:scale-95">
                            They / Them
                        </button>
</div>
</div>
<!-- FIELD 3 - Age -->
<div class="px-6 mt-7 space-y-2 pb-12">
<label class="block font-label text-sm font-semibold text-on-surface">Their approximate age</label>
<p class="text-xs text-stone-500 font-body">A rough range is fine</p>
<!-- Row 1 -->
<div class="flex gap-2 pt-1">
<button class="flex-1 h-12 rounded-full bg-surface-container-lowest border-[#F5E6E0] border-[1.5px] text-stone-500 font-semibold text-[15px] hover:bg-surface-container transition-colors active:scale-95">
                            Under 18
                        </button>
<button class="flex-1 h-12 rounded-full bg-surface-container-lowest border-[#F5E6E0] border-[1.5px] text-stone-500 font-semibold text-[15px] hover:bg-surface-container transition-colors active:scale-95">
                            18 – 25
                        </button>
<button class="flex-1 h-12 rounded-full bg-primary-container text-white font-bold text-[15px] active:scale-95 transition-transform">
                            26 – 35
                        </button>
</div>
<!-- Row 2 -->
<div class="flex justify-center gap-2 pt-1 px-8">
<button class="flex-1 h-12 rounded-full bg-surface-container-lowest border-[#F5E6E0] border-[1.5px] text-stone-500 font-semibold text-[15px] hover:bg-surface-container transition-colors active:scale-95">
                            36 – 50
                        </button>
<button class="flex-1 h-12 rounded-full bg-surface-container-lowest border-[#F5E6E0] border-[1.5px] text-stone-500 font-semibold text-[15px] hover:bg-surface-container transition-colors active:scale-95">
                            50+
                        </button>
</div>
</div>
</section>
<!-- Bottom Action Area -->
<footer class="px-6 pb-12 mt-auto">
<button class="w-full h-[52px] bg-primary-container text-white font-bold rounded-full shadow-[0_8px_32px_rgba(172,53,9,0.15)] hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
                    Continue 
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<div class="mt-6 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px] text-stone-400">lock</span>
<p class="text-xs text-stone-400 font-body text-center">
                        We don't save any personal information.
                    </p>
</div>
</footer>
</main>
<!-- Dynamic Decorative Elements -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/2 -left-20 w-48 h-48 bg-secondary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<!-- BottomNavBar - Suppressed for transactional flow as per instructions -->
</div>
